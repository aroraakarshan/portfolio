<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#060a13"/>
  <!-- Left A: /\ rising to shared center peak -->
  <!-- Right A (inverted): \/ falling from shared center peak -->
  <!-- Together they form: /\/ with a horizontal crossbar — like N with a bar -->
  <g stroke="#06b6d4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left leg of first A -->
    <line x1="22" y1="100" x2="64" y2="28"/>
    <!-- Shared center leg (the "N" vertical) -->
    <line x1="64" y1="28" x2="64" y2="100"/>
    <!-- Right leg rising back up (inverted A) -->
    <line x1="64" y1="100" x2="106" y2="28"/>
    <!-- Crossbar spanning both A's -->
    <line x1="32" y1="72" x2="96" y2="72"/>
  </g>
</svg>
