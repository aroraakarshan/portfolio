<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060a13"/>
      <stop offset="1" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(148,163,184,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#grid)"/>

  <!-- Decorative circuit accents in corners -->
  <g stroke="rgba(59,130,246,0.35)" stroke-width="2" fill="none">
    <path d="M 0 1000 L 140 1000 L 140 920 L 280 920"/>
    <path d="M 920 200 L 1060 200 L 1060 280 L 1200 280"/>
    <circle cx="140" cy="1000" r="7" fill="#3b82f6"/>
    <circle cx="280" cy="920" r="7" fill="#06b6d4"/>
    <circle cx="1060" cy="200" r="7" fill="#22c55e"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="340"
        text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="26"
        font-weight="500"
        letter-spacing="4"
        fill="#06b6d4">
    VLSI ENGINEER · INTERACTIVE EDUCATION
  </text>

  <!-- Name -->
  <text x="600" y="490"
        text-anchor="middle"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="110"
        font-weight="800"
        fill="#f8fafc">
    Akarshan Arora
  </text>

  <!-- Headline -->
  <text x="600" y="630"
        text-anchor="middle"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="56"
        font-weight="700"
        fill="url(#accent)">
    Building tools that make
  </text>
  <text x="600" y="705"
        text-anchor="middle"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="56"
        font-weight="700"
        fill="#f8fafc">
    complex concepts click.
  </text>

  <!-- URL chip -->
  <rect x="430" y="790" width="340" height="54" rx="27" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="600" y="826"
        text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="22"
        font-weight="500"
        fill="#06b6d4">
    akarshanarora.com
  </text>
</svg>
